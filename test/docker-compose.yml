version: '3.8'

services:
  wg-server:
    build:
      context: .
      network: host
      dockerfile_inline: |
        FROM alpine:latest
        RUN apk add --no-cache iproute2 wireguard-tools socat bash iperf3 iptables
        
        RUN cat <<'EOF' > /entrypoint.sh
        #!/bin/bash
        set -e
        mkdir -p /etc/wireguard
        
        wg genkey | tee /etc/wireguard/server_priv | wg pubkey > /etc/wireguard/server_pub
        wg genkey | tee /etc/wireguard/client_priv | wg pubkey > /etc/wireguard/client_pub

        cat <<WG_CONF > /etc/wireguard/wg0.conf
        [Interface]
        PrivateKey = $(cat /etc/wireguard/server_priv)
        Address = 10.1.1.1/24
        ListenPort = 51820

        [Peer]
        PublicKey = $(cat /etc/wireguard/client_pub)
        AllowedIPs = 10.1.1.2/32
        WG_CONF

        wg-quick up wg0

        echo "ready"
        exec sleep infinity
        EOF
        RUN chmod +x /entrypoint.sh

        ENTRYPOINT ["/entrypoint.sh"]
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    ports:
      - "51820:51820/udp"
    networks:
      - wg-net

networks:
  wg-net:
    internal: false
